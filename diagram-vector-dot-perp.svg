<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="700" height="380" fill="#fffdf7"/>
  <line x1="60" y1="190" x2="360" y2="190" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="150" y1="330" x2="150" y2="40" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="150" y1="190" x2="255" y2="85" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="190" x2="255" y2="295" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M 170 190 L 170 170 L 190 170" fill="none" stroke="#16a34a" stroke-width="2.2"/>
  <circle cx="150" cy="190" r="4.5" fill="#0f172a"/>
  <g font-family="Arial, sans-serif" font-size="18" fill="#0f172a">
    <text x="367" y="196">x</text>
    <text x="157" y="36">y</text>
    <text x="158" y="208">O</text>
    <text x="262" y="82" fill="#2563eb">a = (1, 1)</text>
    <text x="262" y="310" fill="#dc2626">b = (1, -1)</text>
    <text x="176" y="184" fill="#16a34a">90 deg</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="17" fill="#334155">
    <text x="440" y="110">Dot product test:</text>
    <text x="440" y="140">a . b = 1*1 + 1*(-1)</text>
    <text x="440" y="168">a . b = 0</text>
    <text x="440" y="214">If a . b = 0,</text>
    <text x="440" y="242">the vectors are perpendicular.</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="300" rx="18"/>
  <text class="title" x="34" y="42">单链表在 B 后插入新结点 X</text>

  <g transform="translate(42,82)">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="96" height="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="96" y="0" width="56" height="48" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text class="text" x="40" y="30">A</text>
      <text class="small" x="110" y="29">next</text>
    </g>
    <g transform="translate(170,0)">
      <rect x="0" y="0" width="96" height="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="96" y="0" width="56" height="48" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text class="text" x="40" y="30">B</text>
      <text class="small" x="110" y="29">next</text>
    </g>
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="96" height="48" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="96" y="0" width="56" height="48" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text class="text" x="40" y="30">C</text>
      <text class="small" x="110" y="29">next</text>
    </g>
    <line x1="152" y1="24" x2="166" y2="24" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="322" y1="24" x2="336" y2="24" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="492" y1="24" x2="546" y2="24" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text class="text" x="556" y="30">NULL</text>
  </g>

  <g transform="translate(212,188)">
    <rect x="0" y="0" width="96" height="48" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <rect x="96" y="0" width="56" height="48" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text class="text" x="40" y="30">X</text>
    <text class="small" x="110" y="29">next</text>
    <text class="small" x="28" y="-14" fill="#dc2626">新结点</text>
  </g>

  <path d="M364 212 C404 212, 430 182, 458 142" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M364 106 C382 148, 338 170, 298 188" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>

  <rect class="note" x="476" y="154" width="238" height="112" rx="18"/>
  <text class="text" x="498" y="186">正确顺序：</text>
  <text class="small" x="498" y="214">1. 先让 X-&gt;next 接上原后继</text>
  <text class="small" x="498" y="240">2. 再让 B-&gt;next 指向 X</text>
  <text class="small" x="498" y="264">如果反过来做，原链可能断开。</text>
</svg>

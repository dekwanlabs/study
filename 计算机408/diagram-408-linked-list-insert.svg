    <rect x="260" y="0" width="54" height="44" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="204" y="28" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">X</text>
    <text x="276" y="28" font-family="Arial, sans-serif" font-size="18" fill="#475569">next</text>
    <path d="M 245 -24 C 245 -50, 410 -50, 410 -24" fill="none" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M 314 22 C 340 22, 340 22, 340 22" fill="none" stroke="#16a34a" stroke-width="2.5"/>
    <path d="M 314 22 C 330 22, 330 -78, 412 -78" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="6" y="12" font-family="Arial, sans-serif" font-size="17" fill="#334155">Step 1: X-&gt;next = B-&gt;next</text>
    <text x="6" y="72" font-family="Arial, sans-serif" font-size="17" fill="#334155">Step 2: B-&gt;next = X</text>

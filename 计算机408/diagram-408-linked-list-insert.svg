      <text x="34" y="28" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">A</text>
      <text x="104" y="28" font-family="Arial, sans-serif" font-size="18" fill="#475569">next</text>
    </g>
    <g transform="translate(170,0)">
      <rect x="0" y="0" width="90" height="44" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="90" y="0" width="54" height="44" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="34" y="28" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">B</text>
      <text x="104" y="28" font-family="Arial, sans-serif" font-size="18" fill="#475569">next</text>
    </g>
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="90" height="44" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="90" y="0" width="54" height="44" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <text x="34" y="28" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">C</text>
      <text x="104" y="28" font-family="Arial, sans-serif" font-size="18" fill="#475569">next</text>
    </g>
    <line x1="144" y1="22" x2="168" y2="22" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="314" y1="22" x2="338" y2="22" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="484" y1="22" x2="530" y2="22" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="540" y="28" font-family="Arial, sans-serif" font-size="18" fill="#475569">NULL</text>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320">
  <rect width="760" height="320" fill="#fffdf7"/>
  <g stroke="#334155" stroke-width="2.5" fill="none">
    <line x1="220" y1="90" x2="140" y2="150"/>
    <line x1="220" y1="90" x2="300" y2="150"/>
    <line x1="140" y1="150" x2="100" y2="220"/>
    <line x1="140" y1="150" x2="180" y2="220"/>
    <line x1="300" y1="150" x2="260" y2="220"/>
    <line x1="300" y1="150" x2="340" y2="220"/>
  </g>
  <g fill="#dbeafe" stroke="#2563eb" stroke-width="2">
    <circle cx="220" cy="90" r="24"/>
    <circle cx="140" cy="150" r="24"/>
    <circle cx="300" cy="150" r="24"/>
    <circle cx="100" cy="220" r="24"/>
    <circle cx="180" cy="220" r="24"/>
    <circle cx="260" cy="220" r="24"/>
    <circle cx="340" cy="220" r="24"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#0f172a" text-anchor="middle">
    <text x="220" y="97">A</text>
    <text x="140" y="157">B</text>
    <text x="300" y="157">C</text>
    <text x="100" y="227">D</text>
    <text x="180" y="227">E</text>
    <text x="260" y="227">F</text>
    <text x="340" y="227">G</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#0f172a">
    <text x="36" y="40">Binary tree traversal example</text>
    <text x="420" y="96">Preorder: A B D E C F G</text>
    <text x="420" y="146">Inorder: D B E A F C G</text>
    <text x="420" y="196">Postorder: D E B F G C A</text>
    <text x="420" y="246">Level order: A B C D E F G</text>
  </g>
</svg>

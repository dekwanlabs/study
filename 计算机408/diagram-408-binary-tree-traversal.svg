<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" width="760" height="340" rx="18"/>
  <text class="title" x="34" y="42">二叉树遍历示意图</text>

  <g stroke="#334155" stroke-width="2.5" fill="none">
    <line x1="220" y1="92" x2="140" y2="152"/>
    <line x1="220" y1="92" x2="300" y2="152"/>
    <line x1="140" y1="152" x2="100" y2="222"/>
    <line x1="140" y1="152" x2="180" y2="222"/>
    <line x1="300" y1="152" x2="260" y2="222"/>
    <line x1="300" y1="152" x2="340" y2="222"/>
  </g>
  <g fill="#dbeafe" stroke="#2563eb" stroke-width="2">
    <circle cx="220" cy="92" r="24"/>
    <circle cx="140" cy="152" r="24"/>
    <circle cx="300" cy="152" r="24"/>
    <circle cx="100" cy="222" r="24"/>
    <circle cx="180" cy="222" r="24"/>
    <circle cx="260" cy="222" r="24"/>
    <circle cx="340" cy="222" r="24"/>
  </g>
  <g class="text" text-anchor="middle">
    <text x="220" y="98">A</text>
    <text x="140" y="158">B</text>
    <text x="300" y="158">C</text>
    <text x="100" y="228">D</text>
    <text x="180" y="228">E</text>
    <text x="260" y="228">F</text>
    <text x="340" y="228">G</text>
  </g>

  <rect class="note" x="430" y="72" width="286" height="204" rx="18"/>
  <text class="text" x="452" y="104">四种遍历结果</text>
  <text class="small" x="452" y="136">先序：A B D E C F G</text>
  <text class="small" x="452" y="166">中序：D B E A F C G</text>
  <text class="small" x="452" y="196">后序：D E B F G C A</text>
  <text class="small" x="452" y="226">层序：A B C D E F G</text>
  <text class="small" x="452" y="258">记忆：先序看“根左右”，</text>
  <text class="small" x="452" y="280">中序看“左根右”。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" width="760" height="360" rx="18"/>
  <text class="title" x="34" y="42">BFS 按层访问图</text>

  <g stroke="#334155" stroke-width="2.5" fill="none">
    <line x1="110" y1="170" x2="230" y2="100"/>
    <line x1="110" y1="170" x2="230" y2="240"/>
    <line x1="230" y1="100" x2="370" y2="80"/>
    <line x1="230" y1="100" x2="370" y2="170"/>
    <line x1="230" y1="240" x2="370" y2="170"/>
    <line x1="230" y1="240" x2="370" y2="260"/>
    <line x1="370" y1="170" x2="520" y2="170"/>
  </g>
  <g fill="#dcfce7" stroke="#16a34a" stroke-width="2">
    <circle cx="110" cy="170" r="28"/>
    <circle cx="230" cy="100" r="28"/>
    <circle cx="230" cy="240" r="28"/>
    <circle cx="370" cy="80" r="28"/>
    <circle cx="370" cy="170" r="28"/>
    <circle cx="370" cy="260" r="28"/>
    <circle cx="520" cy="170" r="28"/>
  </g>
  <g class="text" text-anchor="middle">
    <text x="110" y="176">A</text>
    <text x="230" y="106">B</text>
    <text x="230" y="246">C</text>
    <text x="370" y="86">D</text>
    <text x="370" y="176">E</text>
    <text x="370" y="266">F</text>
    <text x="520" y="176">G</text>
  </g>

  <rect class="note" x="548" y="68" width="178" height="190" rx="18"/>
  <text class="text" x="570" y="100">从 A 开始 BFS</text>
  <text class="small" x="570" y="132">访问顺序：</text>
  <text class="small" x="570" y="156">A -&gt; B -&gt; C</text>
  <text class="small" x="570" y="180">-&gt; D -&gt; E -&gt; F -&gt; G</text>
  <text class="small" x="570" y="214">核心感觉：</text>
  <text class="small" x="570" y="238">队列保证先把</text>
  <text class="small" x="570" y="260">当前层结点出队。</text>

  <g>
    <rect x="44" y="306" width="86" height="32" rx="16" fill="#e0f2fe"/>
    <rect x="156" y="306" width="110" height="32" rx="16" fill="#dcfce7"/>
    <rect x="292" y="306" width="144" height="32" rx="16" fill="#fee2e2"/>
    <rect x="462" y="306" width="86" height="32" rx="16" fill="#fef3c7"/>
    <text class="small" x="61" y="327">第 0 层：A</text>
    <text class="small" x="177" y="327">第 1 层：B，C</text>
    <text class="small" x="314" y="327">第 2 层：D，E，F</text>
    <text class="small" x="480" y="327">第 3 层：G</text>
  </g>
</svg>

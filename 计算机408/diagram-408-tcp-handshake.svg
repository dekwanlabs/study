<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="340" rx="18"/>
  <text class="title" x="34" y="42">TCP 三次握手</text>

  <line x1="160" y1="74" x2="160" y2="258" stroke="#2563eb" stroke-width="3"/>
  <line x1="602" y1="74" x2="602" y2="258" stroke="#dc2626" stroke-width="3"/>
  <text class="text" x="120" y="60">客户端</text>
  <text class="text" x="566" y="60">服务器</text>

  <line x1="172" y1="108" x2="590" y2="108" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="162" x2="172" y2="162" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="172" y1="216" x2="590" y2="216" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text class="text" x="246" y="98">1. SYN，seq = x</text>
  <text class="text" x="248" y="152">2. SYN + ACK，seq = y，ack = x + 1</text>
  <text class="text" x="262" y="206">3. ACK，ack = y + 1</text>

  <rect class="note" x="386" y="252" width="338" height="60" rx="16"/>
  <text class="small" x="408" y="278">第三次握手完成后，双方都能确认：</text>
  <text class="small" x="408" y="300">发送和接收能力正常，连接正式建立。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" width="760" height="260" rx="18"/>
  <text class="title" x="34" y="42">KMP 的核心感觉：主串不回退</text>

  <text class="text" x="48" y="96">主串：A B A B A C A B A B D</text>
  <text class="text" x="48" y="146">模式串：A B A B D</text>
  <text class="text" x="48" y="196">next：0 0 1 2 0</text>
  <line x1="292" y1="104" x2="292" y2="156" stroke="#dc2626" stroke-width="3"/>
  <text class="small" x="312" y="116">这里发生失配：C 和 D 不同</text>

  <rect class="note" x="474" y="56" width="232" height="156" rx="18"/>
  <text class="text" x="496" y="90">看图记三点</text>
  <text class="small" x="496" y="122">1. 主串指针不回退</text>
  <text class="small" x="496" y="148">2. 模式串按照 next 跳转</text>
  <text class="small" x="496" y="174">3. 避免已经比较过的部分</text>
  <text class="small" x="496" y="196">被重复比较</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="760" height="320" fill="#fffdf7"/>
  <g font-family="Arial, sans-serif" fill="#0f172a">
    <text x="40" y="34" font-size="20">Stack vs Queue</text>
  </g>
  <g transform="translate(70,70)">
    <text x="40" y="-18" font-family="Arial, sans-serif" font-size="18" fill="#334155">Stack (LIFO)</text>
    <rect x="0" y="0" width="90" height="160" fill="none" stroke="#2563eb" stroke-width="3"/>
    <rect x="0" y="120" width="90" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="80" width="90" height="40" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="40" width="90" height="40" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
    <text x="38" y="146" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">A</text>
    <text x="38" y="106" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">B</text>
    <text x="38" y="66" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">C</text>
    <line x1="120" y1="50" x2="90" y2="50" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="126" y="56" font-family="Arial, sans-serif" font-size="18" fill="#dc2626">top</text>
    <text x="-8" y="188" font-family="Arial, sans-serif" font-size="17" fill="#475569">push/pop only at top</text>
  </g>
  <g transform="translate(410,70)">
    <text x="40" y="-18" font-family="Arial, sans-serif" font-size="18" fill="#334155">Queue (FIFO)</text>
    <rect x="0" y="40" width="250" height="60" fill="none" stroke="#16a34a" stroke-width="3"/>
    <line x1="62.5" y1="40" x2="62.5" y2="100" stroke="#16a34a" stroke-width="2"/>
    <line x1="125" y1="40" x2="125" y2="100" stroke="#16a34a" stroke-width="2"/>
    <line x1="187.5" y1="40" x2="187.5" y2="100" stroke="#16a34a" stroke-width="2"/>
    <text x="26" y="76" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">A</text>
    <text x="88" y="76" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">B</text>
    <text x="151" y="76" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">C</text>
    <line x1="-40" y1="70" x2="0" y2="70" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="-34" y="58" font-family="Arial, sans-serif" font-size="18" fill="#dc2626">front</text>
    <line x1="290" y1="70" x2="250" y2="70" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="258" y="58" font-family="Arial, sans-serif" font-size="18" fill="#2563eb">rear</text>
    <text x="8" y="138" font-family="Arial, sans-serif" font-size="17" fill="#475569">enqueue at rear, dequeue at front</text>
  </g>
</svg>

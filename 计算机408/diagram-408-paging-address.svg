<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#fffdf7"/>
  <g font-family="Arial, sans-serif" font-size="18" fill="#0f172a">
    <text x="34" y="38">Paging address translation</text>
    <text x="34" y="68">Logical address = page number p + offset d</text>
  </g>
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="120" height="52" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="120" y="0" width="160" height="52" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="42" y="32" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">page p</text>
    <text x="178" y="32" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">offset d</text>
    <line x1="290" y1="26" x2="380" y2="26" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="390" y="-18" width="170" height="88" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="418" y="12" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">Page table</text>
    <text x="418" y="40" font-family="Arial, sans-serif" font-size="17" fill="#0f172a">p -&gt; frame f</text>
    <line x1="560" y1="26" x2="640" y2="26" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="650" y="0" width="60" height="52" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <rect x="710" y="0" width="40" height="52" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="660" y="32" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">f</text>
    <text x="722" y="32" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">d</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#475569">
    <text x="44" y="236">Physical address = frame number f + same offset d</text>
    <text x="44" y="264">Core idea: page changes, offset stays unchanged</text>
  </g>
</svg>

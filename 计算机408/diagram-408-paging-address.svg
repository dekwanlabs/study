<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="320" rx="18"/>
  <text class="title" x="34" y="42">分页地址转换示意图</text>
  <text class="small" x="36" y="70">逻辑地址 = 页号 p + 页内偏移 d</text>

  <g transform="translate(46,108)">
    <rect x="0" y="0" width="102" height="56" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="102" y="0" width="146" height="56" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text class="text" x="20" y="34">页号 p</text>
    <text class="text" x="138" y="34">页内偏移 d</text>

    <line x1="256" y1="28" x2="330" y2="28" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="344" y="-16" width="140" height="88" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text class="text" x="374" y="18">页表</text>
    <text class="small" x="364" y="48">查找：p -&gt; f</text>

    <line x1="484" y1="28" x2="540" y2="28" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="554" y="0" width="70" height="56" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <rect x="624" y="0" width="84" height="56" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text class="text" x="568" y="34">块号 f</text>
    <text class="text" x="646" y="34">偏移 d</text>
  </g>

  <rect class="note" x="44" y="226" width="672" height="64" rx="16"/>
  <text class="small" x="66" y="254">核心点：页号会通过页表换成物理块号，但页内偏移 d 保持不变。</text>
  <text class="small" x="66" y="278">所以题目里经常会问：“为什么偏移量不变？”</text>
</svg>

    <line class="guide" x1="212" y1="246" x2="212" y2="201"/>
    <line class="guide" x1="336" y1="246" x2="336" y2="156"/>
    <line class="guide" x1="88" y1="201" x2="212" y2="201"/>
    <line class="guide" x1="88" y1="156" x2="336" y2="156"/>

    <circle class="point1" cx="212" cy="201" r="5.5"/>
    <circle class="point1" cx="336" cy="156" r="5.5"/>
    <circle class="point1" cx="150" cy="246" r="5.5"/>

    <g class="text">
      <text x="410" y="252">x</text>
      <text x="96" y="112">y</text>
      <text x="113" y="264">0.5</text>
      <text x="145" y="264">1</text>
      <text x="207" y="264">N</text>
      <text x="331" y="264">M</text>
      <text x="70" y="341">-2</text>
      <text x="70" y="296">-1</text>
      <text x="73" y="251">0</text>
      <text x="75" y="206">1</text>
      <text x="75" y="161">2</text>
      <text x="160" y="241">(1, 0)</text>
    </g>
  </g>

  <g transform="translate(448,0)">
    <rect class="panel" x="28" y="96" width="396" height="314" rx="20"/>
    <text class="paneltitle" x="48" y="126">0 &lt; a &lt; 1：递减，反向比较</text>
    <text class="formula" x="270" y="126">示例：y = log<tspan baseline-shift="sub" font-size="11">1/2</tspan> x</text>

    <g class="grid">
      <line x1="88" y1="156" x2="402" y2="156"/>
      <line x1="88" y1="201" x2="402" y2="201"/>
      <line x1="88" y1="246" x2="402" y2="246"/>
      <line x1="88" y1="291" x2="402" y2="291"/>
      <line x1="88" y1="336" x2="402" y2="336"/>
      <line x1="119" y1="112" x2="119" y2="382"/>
      <line x1="150" y1="112" x2="150" y2="382"/>
      <line x1="212" y1="112" x2="212" y2="382"/>
      <line x1="336" y1="112" x2="336" y2="382"/>
    </g>

    <line class="axis" x1="60" y1="246" x2="408" y2="246" marker-end="url(#arrow)"/>
    <line class="axis" x1="88" y1="382" x2="88" y2="114" marker-end="url(#arrow)"/>

    <polyline class="curve2" points="97.3,122.8 100.4,141.5 103.5,156.0 106.6,167.8 109.7,177.8 112.8,186.5 115.9,194.2 119.0,201.0 122.1,207.2 125.2,212.8 128.3,218.0 131.4,222.8 134.5,227.3 137.6,231.5 140.7,235.4 143.8,239.2 146.9,242.7 150.0,246.0 153.1,249.2 156.2,252.2 159.3,255.1 162.4,257.8 165.5,260.5 168.6,263.0 171.7,265.5 174.8,267.8 177.9,270.1 181.0,272.3 184.1,274.5 187.2,276.5 190.3,278.5 193.4,280.4 196.5,282.3 199.6,284.2 202.7,285.9 205.8,287.7 208.9,289.4 212.0,291.0 215.1,292.6 218.2,294.2 221.3,295.7 224.4,297.2 227.5,298.6 230.6,300.1 233.7,301.5 236.8,302.8 239.9,304.2 243.0,305.5 246.1,306.8 249.2,308.0 252.3,309.3 255.4,310.5 258.5,311.7 261.6,312.8 264.7,314.0 267.8,315.1 270.9,316.2 274.0,317.3 277.1,318.4 280.2,319.5 283.3,320.5 286.4,321.5 289.5,322.5 292.6,323.5 295.7,324.5 298.8,325.4 301.9,326.4 305.0,327.3 308.1,328.3 311.2,329.2 314.3,330.1 317.4,330.9 320.5,331.8 323.6,332.7 326.7,333.5 329.8,334.4 332.9,335.2 336.0,336.0 339.1,336.8 342.2,337.6 345.3,338.4 348.4,339.2 351.5,339.9 354.6,340.7 357.7,341.4 360.8,342.2 363.9,342.9 367.0,343.6 370.1,344.4 373.2,345.1 376.3,345.8 379.4,346.5 382.5,347.2 385.6,347.8 388.7,348.5 391.8,349.2 394.9,349.8 398.0,350.5 401.1,351.1 404.2,351.8 407.3,352.4 410.4,353.0 413.5,353.7 416.6,354.3"/>

    <line class="guide" x1="119" y1="246" x2="119" y2="201"/>
    <line class="guide" x1="212" y1="246" x2="212" y2="291"/>
    <line class="guide" x1="88" y1="201" x2="119" y2="201"/>
    <line class="guide" x1="88" y1="291" x2="212" y2="291"/>

    <circle class="point2" cx="119" cy="201" r="5.5"/>
    <circle class="point2" cx="212" cy="291" r="5.5"/>
    <circle class="point2" cx="150" cy="246" r="5.5"/>

    <g class="text">
      <text x="410" y="252">x</text>
      <text x="96" y="112">y</text>
      <text x="113" y="264">M</text>
      <text x="145" y="264">1</text>
      <text x="207" y="264">N</text>
      <text x="331" y="264">4</text>
      <text x="70" y="341">-2</text>
      <text x="70" y="296">-1</text>
      <text x="73" y="251">0</text>
      <text x="75" y="206">1</text>
      <text x="75" y="161">2</text>
      <text x="160" y="241">(1, 0)</text>
    </g>
  </g>

  <rect class="card" x="28" y="430" width="396" height="78" rx="16"/>
  <text class="cardtext" x="52" y="458">
    <tspan>M &gt; N ⇒ logₐ M &gt; logₐ N</tspan>
    <tspan x="52" dy="23">x &gt; 1 ⇒ logₐ x &gt; 0</tspan>
    <tspan x="52" dy="23">0 &lt; x &lt; 1 ⇒ logₐ x &lt; 0</tspan>
  </text>

  <rect class="card" x="476" y="430" width="396" height="78" rx="16"/>
  <text class="cardtext" x="500" y="458">
    <tspan>M &lt; N ⇒ logₐ M &gt; logₐ N</tspan>
    <tspan x="500" dy="23">x &gt; 1 ⇒ logₐ x &lt; 0</tspan>
    <tspan x="500" dy="23">0 &lt; x &lt; 1 ⇒ logₐ x &gt; 0</tspan>
  </text>

  <rect class="note" x="36" y="530" width="848" height="60" rx="18"/>
  <text class="text" x="60" y="558">读图口诀：先看增减，再看正负。增函数同向比较，减函数反向比较；点 (1, 0) 把正负分成左右两边。</text>
  <text class="text" x="60" y="582">所以：a &gt; 1 时右边为正、左边为负；0 &lt; a &lt; 1 时右边为负、左边为正。</text>
</svg>

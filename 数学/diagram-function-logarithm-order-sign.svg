<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .note { fill: #fffaf0; stroke: #f1e0b8; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.4; }
      .guide { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 6; fill: none; }
      .curve1 { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .curve2 { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .point1 { fill: #dc2626; }
      .point2 { fill: #2563eb; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      .subtitle {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .paneltitle {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 14px;
        fill: #475569;
      }
      .formula {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 14px;
        fill: #475569;
      }
      .accent1 {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        font-weight: 600;
        fill: #b91c1c;
      }
      .accent2 {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        font-weight: 600;
        fill: #1d4ed8;
      }
      .cardtext {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #0f172a;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="620" rx="20"/>
  <text class="title" x="34" y="46">对数函数的比较大小与正负</text>
  <text class="subtitle" x="34" y="72">先看图像是递增还是递减，再看图像在 x 轴上方还是下方，这两步就能判断大小关系和正负。</text>

  <g>
    <rect class="panel" x="28" y="96" width="396" height="314" rx="20"/>
    <text class="paneltitle" x="48" y="126">a &gt; 1：递增，同向比较</text>
    <text class="formula" x="290" y="126">示例：y = log<tspan baseline-shift="sub" font-size="11">2</tspan> x</text>

    <g class="grid">
      <line x1="88" y1="156" x2="402" y2="156"/>
      <line x1="88" y1="201" x2="402" y2="201"/>
      <line x1="88" y1="246" x2="402" y2="246"/>
      <line x1="88" y1="291" x2="402" y2="291"/>
      <line x1="88" y1="336" x2="402" y2="336"/>
      <line x1="119" y1="112" x2="119" y2="382"/>
      <line x1="150" y1="112" x2="150" y2="382"/>
      <line x1="212" y1="112" x2="212" y2="382"/>
      <line x1="336" y1="112" x2="336" y2="382"/>
    </g>


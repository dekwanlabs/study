<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.4; }
      .guide { stroke: #16a34a; stroke-width: 2.2; stroke-dasharray: 7 5; }
      .vector { stroke: #7c3aed; stroke-width: 3.6; fill: none; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="420" rx="18"/>
  <text class="title" x="34" y="42">向量 AB 为什么是“终点减起点”</text>
  <g class="grid">
    <line x1="100" y1="70" x2="400" y2="70"/>
    <line x1="100" y1="115" x2="400" y2="115"/>
    <line x1="100" y1="160" x2="400" y2="160"/>
    <line x1="100" y1="205" x2="400" y2="205"/>
    <line x1="100" y1="250" x2="400" y2="250"/>
    <line x1="100" y1="295" x2="400" y2="295"/>
    <line x1="100" y1="340" x2="400" y2="340"/>
    <line x1="100" y1="70" x2="100" y2="340"/>
    <line x1="160" y1="70" x2="160" y2="340"/>
    <line x1="220" y1="70" x2="220" y2="340"/>
    <line x1="280" y1="70" x2="280" y2="340"/>
    <line x1="340" y1="70" x2="340" y2="340"/>
    <line x1="400" y1="70" x2="400" y2="340"/>
  </g>
  <line class="axis" x1="76" y1="340" x2="438" y2="340" marker-end="url(#arrow)"/>
  <line class="axis" x1="100" y1="368" x2="100" y2="38" marker-end="url(#arrow)"/>
  <circle cx="160" cy="250" r="5.5" fill="#2563eb"/>
  <circle cx="340" cy="70" r="5.5" fill="#dc2626"/>
  <line class="vector" x1="160" y1="250" x2="340" y2="70" marker-end="url(#arrow)"/>
  <line class="guide" x1="160" y1="250" x2="340" y2="250"/>
  <line class="guide" x1="340" y1="250" x2="340" y2="70"/>
  <g class="text">
    <text x="446" y="346">x</text>
    <text x="108" y="38">y</text>
    <text x="92" y="358">0</text>
    <text x="154" y="364">1</text>
    <text x="214" y="364">2</text>
    <text x="274" y="364">3</text>
    <text x="334" y="364">4</text>
    <text x="394" y="364">5</text>
    <text x="80" y="345">0</text>
    <text x="76" y="300">1</text>
    <text x="76" y="255">2</text>
    <text x="76" y="210">3</text>
    <text x="76" y="165">4</text>
    <text x="76" y="120">5</text>
    <text x="76" y="75">6</text>
    <text x="118" y="242">A(1, 2)</text>
    <text x="350" y="64">B(4, 6)</text>
    <text x="214" y="150" fill="#7c3aed">向量 AB</text>
    <text x="220" y="242" fill="#16a34a">横向 +3</text>
    <text x="350" y="166" fill="#16a34a">纵向 +4</text>
  </g>
  <rect class="note" x="500" y="84" width="220" height="212" rx="18"/>
  <text class="highlight" x="522" y="116">从图上直接读</text>
  <text class="small" x="522" y="148">横向变化：4 - 1 = 3</text>
  <text class="small" x="522" y="178">纵向变化：6 - 2 = 4</text>
  <text class="text" x="522" y="216">所以：</text>
  <text class="text" x="522" y="244">AB = (4 - 1, 6 - 2)</text>
  <text class="highlight" x="522" y="274">AB = (3, 4)</text>
</svg>

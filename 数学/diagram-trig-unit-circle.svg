<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fffdf7"/>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="80" y1="90" x2="80" y2="330"/>
    <line x1="140" y1="90" x2="140" y2="330"/>
    <line x1="260" y1="90" x2="260" y2="330"/>
    <line x1="320" y1="90" x2="320" y2="330"/>
    <line x1="380" y1="90" x2="380" y2="330"/>
    <line x1="440" y1="90" x2="440" y2="330"/>
    <line x1="80" y1="90" x2="440" y2="90"/>
    <line x1="80" y1="150" x2="440" y2="150"/>
    <line x1="80" y1="270" x2="440" y2="270"/>
    <line x1="80" y1="330" x2="440" y2="330"/>
  </g>
  <line x1="40" y1="210" x2="500" y2="210" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="200" y1="370" x2="200" y2="40" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <circle cx="200" cy="210" r="120" fill="none" stroke="#0f766e" stroke-width="3"/>
  <line x1="200" y1="210" x2="284.9" y2="125.1" stroke="#dc2626" stroke-width="3"/>
  <line x1="284.9" y1="125.1" x2="284.9" y2="210" stroke="#2563eb" stroke-width="2.2" stroke-dasharray="6 5"/>
  <line x1="200" y1="125.1" x2="284.9" y2="125.1" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="6 5"/>
  <path d="M 240 210 A 40 40 0 0 0 228 181" fill="none" stroke="#7c3aed" stroke-width="2.2"/>
  <circle cx="284.9" cy="125.1" r="5" fill="#dc2626"/>
  <circle cx="320" cy="210" r="4.5" fill="#0f766e"/>
  <circle cx="200" cy="90" r="4.5" fill="#0f766e"/>
  <circle cx="80" cy="210" r="4.5" fill="#0f766e"/>
  <circle cx="200" cy="330" r="4.5" fill="#0f766e"/>
  <g font-family="Arial, sans-serif" font-size="18" fill="#0f172a">
    <text x="512" y="216">x</text>
    <text x="208" y="36">y</text>
    <text x="206" y="230">O</text>
    <text x="326" y="216">(1, 0)</text>
    <text x="208" y="84">(0, 1)</text>
    <text x="20" y="216">(-1, 0)</text>
    <text x="208" y="352">(0, -1)</text>
    <text x="240" y="112">P(cos x, sin x)</text>
    <text x="246" y="190">x</text>
    <text x="292" y="173" fill="#2563eb">sin x</text>
    <text x="222" y="118" fill="#16a34a">cos x</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" fill="#334155">
    <text x="305" y="80">QI: sin+, cos+, tan+</text>
    <text x="32" y="80">QII: sin+, cos-, tan-</text>
    <text x="12" y="360">QIII: sin-, cos-, tan+</text>
    <text x="300" y="360">QIV: sin-, cos+, tan-</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#475569">
    <text x="430" y="120">Read P on the unit circle:</text>
    <text x="430" y="142">horizontal = cos x</text>
    <text x="430" y="164">vertical = sin x</text>
    <text x="430" y="186">quadrant decides the sign</text>
  </g>
</svg>

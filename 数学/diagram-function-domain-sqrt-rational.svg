<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .axis { stroke: #334155; stroke-width: 2.6; }
      .tick { stroke: #94a3b8; stroke-width: 2; }
      .ok { stroke: #16a34a; stroke-width: 10; stroke-linecap: round; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .formula {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="220" rx="18"/>
  <text class="title" x="36" y="42">定义域数轴</text>
  <rect class="note" x="430" y="24" width="298" height="76" rx="16"/>
  <text class="text" x="452" y="50">同时满足两个条件：</text>
  <text class="small" x="452" y="75">1. x + 1 &gt;= 0，所以 x &gt;= -1</text>
  <text class="small" x="452" y="98">2. x - 2 != 0，所以 x != 2</text>
  <line class="axis" x1="82" y1="138" x2="676" y2="138" marker-end="url(#arrow)"/>
  <g class="tick">
    <line x1="90" y1="126" x2="90" y2="150"/>
    <line x1="170" y1="126" x2="170" y2="150"/>
    <line x1="250" y1="126" x2="250" y2="150"/>
    <line x1="330" y1="126" x2="330" y2="150"/>
    <line x1="410" y1="126" x2="410" y2="150"/>
    <line x1="490" y1="126" x2="490" y2="150"/>
    <line x1="570" y1="126" x2="570" y2="150"/>
    <line x1="650" y1="126" x2="650" y2="150"/>
  </g>
  <g class="text">
    <text x="82" y="176">-2</text>
    <text x="162" y="176">-1</text>
    <text x="245" y="176">0</text>
    <text x="325" y="176">1</text>
    <text x="405" y="176">2</text>
    <text x="485" y="176">3</text>
    <text x="565" y="176">4</text>
    <text x="645" y="176">5</text>
    <text x="690" y="144">x</text>
  </g>
  <line class="ok" x1="170" y1="138" x2="396" y2="138"/>
  <line class="ok" x1="424" y1="138" x2="664" y2="138"/>
  <circle cx="170" cy="138" r="7" fill="#16a34a"/>
  <circle cx="410" cy="138" r="9" fill="#fffdf7" stroke="#dc2626" stroke-width="3"/>
  <text class="small" x="136" y="116" fill="#15803d">取到 -1</text>
  <text class="small" x="382" y="116" fill="#dc2626">去掉 2</text>
  <text class="formula" x="430" y="172">定义域：从 -1 起向右，但去掉 2</text>
  <text class="small" x="430" y="198">读法：从 -1 开始向右延伸，但 2 这个点要挖空。</text>
</svg>

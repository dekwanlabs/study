<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.5; }
      .guide { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 6; }
      .curve { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="420" rx="18"/>
  <text class="title" x="34" y="42">导数符号决定最小值位置</text>
  <g class="grid">
    <line x1="120" y1="120" x2="420" y2="120"/>
    <line x1="120" y1="170" x2="420" y2="170"/>
    <line x1="120" y1="220" x2="420" y2="220"/>
    <line x1="120" y1="270" x2="420" y2="270"/>
    <line x1="120" y1="320" x2="420" y2="320"/>
    <line x1="120" y1="120" x2="120" y2="320"/>
    <line x1="190" y1="120" x2="190" y2="320"/>
    <line x1="260" y1="120" x2="260" y2="320"/>
    <line x1="330" y1="120" x2="330" y2="320"/>
    <line x1="400" y1="120" x2="400" y2="320"/>
  </g>
  <line class="axis" x1="90" y1="270" x2="450" y2="270" marker-end="url(#arrow)"/>
  <line class="axis" x1="120" y1="350" x2="120" y2="80" marker-end="url(#arrow)"/>
  <line class="guide" x1="260" y1="120" x2="260" y2="320"/>
  <path class="curve" d="M120 120 C156 212 206 298 260 320 C314 298 364 212 400 120"/>
  <circle cx="260" cy="320" r="6" fill="#2563eb"/>
  <g class="text">
    <text x="458" y="276">x</text>
    <text x="128" y="78">y</text>
    <text x="112" y="288">0</text>
    <text x="184" y="294">1</text>
    <text x="254" y="294">2</text>
    <text x="324" y="294">3</text>
    <text x="394" y="294">4</text>
    <text x="102" y="325">-1</text>
    <text x="106" y="275">0</text>
    <text x="106" y="225">1</text>
    <text x="106" y="175">2</text>
    <text x="106" y="125">3</text>
    <text x="276" y="314">顶点 (2, -1)</text>
  </g>
  <rect class="note" x="500" y="84" width="220" height="220" rx="18"/>
  <text class="highlight" x="522" y="116">导数怎么看单调性</text>
  <text class="small" x="522" y="150">x &lt; 2 时，y' = 2x - 4 &lt; 0</text>
  <text class="small" x="522" y="180">函数递减</text>
  <text class="small" x="522" y="214">x &gt; 2 时，y' = 2x - 4 &gt; 0</text>
  <text class="small" x="522" y="244">函数递增</text>
  <text class="text" x="522" y="278">所以最小值在 x = 2 处取到</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .line { stroke: #64748b; stroke-width: 2.2; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .start { fill: #dcfce7; stroke: #22c55e; stroke-width: 1.8; }
      .leaf { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.5; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .formula {
        font-family: "Times New Roman", "Cambria Math", serif;
        font-size: 22px;
        fill: #0f766e;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect class="bg" width="960" height="360" rx="18"/>
  <text class="title" x="34" y="44">分步乘法原理的树状图</text>

  <circle class="start" cx="88" cy="180" r="34"/>
  <text class="text" x="63" y="186">开始</text>

  <circle class="node" cx="286" cy="92" r="28"/>
  <circle class="node" cx="286" cy="180" r="28"/>
  <circle class="node" cx="286" cy="268" r="28"/>
  <text class="text" x="260" y="98">上衣A</text>
  <text class="text" x="260" y="186">上衣B</text>
  <text class="text" x="260" y="274">上衣C</text>

  <line class="line" x1="118" y1="164" x2="258" y2="104"/>
  <line class="line" x1="122" y1="180" x2="258" y2="180"/>
  <line class="line" x1="118" y1="196" x2="258" y2="256"/>

  <g>
    <line class="line" x1="314" y1="92" x2="494" y2="58"/>
    <line class="line" x1="314" y1="92" x2="494" y2="126"/>
    <line class="line" x1="314" y1="180" x2="494" y2="146"/>
    <line class="line" x1="314" y1="180" x2="494" y2="214"/>
    <line class="line" x1="314" y1="268" x2="494" y2="234"/>
    <line class="line" x1="314" y1="268" x2="494" y2="302"/>
  </g>

  <g>
    <rect class="leaf" x="494" y="42" width="92" height="32" rx="12"/>
    <rect class="leaf" x="494" y="110" width="92" height="32" rx="12"/>
    <rect class="leaf" x="494" y="130" width="92" height="32" rx="12" opacity="0"/>
    <rect class="leaf" x="494" y="146" width="92" height="32" rx="12"/>
    <rect class="leaf" x="494" y="198" width="92" height="32" rx="12"/>
    <rect class="leaf" x="494" y="250" width="92" height="32" rx="12"/>
    <rect class="leaf" x="494" y="286" width="92" height="32" rx="12"/>
  </g>

  <text class="text" x="520" y="63">A-1</text>
  <text class="text" x="520" y="131">A-2</text>
  <text class="text" x="520" y="167">B-1</text>
  <text class="text" x="520" y="219">B-2</text>
  <text class="text" x="520" y="271">C-1</text>
  <text class="text" x="520" y="307">C-2</text>

  <rect class="note" x="642" y="84" width="264" height="174" rx="18"/>
  <text class="text" x="670" y="122">看树状图的顺序：</text>
  <text class="small" x="670" y="156">1. 先选上衣，有 3 种</text>
  <text class="small" x="670" y="186">2. 再选裤子，每条支路下都有 2 种</text>
  <text class="small" x="670" y="216">3. 每条从左到右的完整路径就是一种方案</text>
  <text class="formula" x="670" y="252">3 x 2 = 6</text>
</svg>

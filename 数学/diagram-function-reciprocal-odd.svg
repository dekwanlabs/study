<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.5; }
      .curve { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; }
      .guide { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 6; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="420" rx="18"/>
  <text class="title" x="34" y="42">反比例函数与奇函数</text>
  <g class="grid">
    <line x1="70" y1="90" x2="430" y2="90"/>
    <line x1="70" y1="150" x2="430" y2="150"/>
    <line x1="70" y1="210" x2="430" y2="210"/>
    <line x1="70" y1="270" x2="430" y2="270"/>
    <line x1="70" y1="330" x2="430" y2="330"/>
    <line x1="130" y1="50" x2="130" y2="370"/>
    <line x1="190" y1="50" x2="190" y2="370"/>
    <line x1="250" y1="50" x2="250" y2="370"/>
    <line x1="310" y1="50" x2="310" y2="370"/>
    <line x1="370" y1="50" x2="370" y2="370"/>
    <line x1="430" y1="50" x2="430" y2="370"/>
  </g>
  <line class="axis" x1="50" y1="210" x2="450" y2="210" marker-end="url(#arrow)"/>
  <line class="axis" x1="250" y1="370" x2="250" y2="30" marker-end="url(#arrow)"/>
  <path class="curve" d="M268 58 C282 88 300 118 325 148 C350 176 383 190 428 198"/>
  <path class="curve" d="M72 222 C118 230 150 244 175 272 C200 300 218 330 232 360"/>
  <line class="guide" x1="190" y1="270" x2="310" y2="150"/>
  <circle cx="310" cy="150" r="5.5" fill="#2563eb"/>
  <circle cx="190" cy="270" r="5.5" fill="#2563eb"/>
  <circle cx="250" cy="210" r="4" fill="#0f172a"/>
  <g class="text">
    <text x="457" y="216">x</text>
    <text x="258" y="30">y</text>
    <text x="257" y="232">O</text>
    <text x="320" y="144">A(1, 1)</text>
    <text x="86" y="292">B(-1, -1)</text>
    <text x="124" y="232">-2</text>
    <text x="184" y="232">-1</text>
    <text x="304" y="232">1</text>
    <text x="364" y="232">2</text>
    <text x="232" y="274">-1</text>
    <text x="232" y="154">1</text>
  </g>
  <rect class="note" x="500" y="74" width="220" height="238" rx="18"/>
  <text class="highlight" x="522" y="104">看图抓三点</text>
  <text class="small" x="522" y="136">1. 定义域是 x 不等于 0</text>
  <text class="small" x="522" y="166">2. 两支曲线关于原点中心对称</text>
  <text class="small" x="522" y="196">3. 对应点满足 f(-x) = -f(x)</text>
  <text class="small" x="522" y="238">结论：</text>
  <text class="text" x="522" y="266">y = 1/x 是奇函数。</text>
  <text class="small" x="522" y="296">记忆方式：先看定义域，再看</text>
  <text class="small" x="522" y="318">图像是否关于原点对称。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .axis { stroke: #334155; stroke-width: 2.4; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="380" rx="18"/>
  <text class="title" x="34" y="42">数量积为什么能判断垂直</text>
  <line class="axis" x1="70" y1="200" x2="390" y2="200" marker-end="url(#arrow)"/>
  <line class="axis" x1="170" y1="330" x2="170" y2="46" marker-end="url(#arrow)"/>
  <line x1="170" y1="200" x2="260" y2="110" stroke="#2563eb" stroke-width="3.6" marker-end="url(#arrow)"/>
  <line x1="170" y1="200" x2="260" y2="290" stroke="#dc2626" stroke-width="3.6" marker-end="url(#arrow)"/>
  <path d="M190 200 L190 180 L210 180" fill="none" stroke="#16a34a" stroke-width="2.4"/>
  <circle cx="170" cy="200" r="4.5" fill="#0f172a"/>
  <g class="text">
    <text x="398" y="206">x</text>
    <text x="178" y="44">y</text>
    <text x="178" y="220">O</text>
    <text x="270" y="108" fill="#2563eb">a = (1, 1)</text>
    <text x="270" y="306" fill="#dc2626">b = (1, -1)</text>
    <text x="198" y="194" fill="#16a34a">直角</text>
  </g>
  <rect class="note" x="470" y="86" width="230" height="196" rx="18"/>
  <text class="highlight" x="492" y="118">数量积判定</text>
  <text class="small" x="492" y="152">a · b = 1×1 + 1×(-1)</text>
  <text class="small" x="492" y="182">= 0</text>
  <text class="text" x="492" y="220">数量积为 0</text>
  <text class="text" x="492" y="246">所以 a 与 b 垂直</text>
</svg>

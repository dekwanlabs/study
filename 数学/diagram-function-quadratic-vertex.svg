<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.5; }
      .guide { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 6; }
      .curve { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="420" rx="18"/>
  <text class="title" x="34" y="42">二次函数顶点图像</text>
  <g class="grid">
    <line x1="120" y1="80" x2="420" y2="80"/>
    <line x1="120" y1="130" x2="420" y2="130"/>
    <line x1="120" y1="180" x2="420" y2="180"/>
    <line x1="120" y1="230" x2="420" y2="230"/>
    <line x1="120" y1="280" x2="420" y2="280"/>
    <line x1="120" y1="330" x2="420" y2="330"/>
    <line x1="120" y1="60" x2="120" y2="350"/>
    <line x1="190" y1="60" x2="190" y2="350"/>
    <line x1="260" y1="60" x2="260" y2="350"/>
    <line x1="330" y1="60" x2="330" y2="350"/>
    <line x1="400" y1="60" x2="400" y2="350"/>
  </g>
  <line class="axis" x1="90" y1="330" x2="450" y2="330" marker-end="url(#arrow)"/>
  <line class="axis" x1="120" y1="360" x2="120" y2="40" marker-end="url(#arrow)"/>
  <line class="guide" x1="260" y1="60" x2="260" y2="350"/>
  <path class="curve" d="M120 80 C156 172 206 258 260 280 C314 258 364 172 400 80"/>
  <circle cx="260" cy="280" r="6" fill="#2563eb"/>
  <g class="text">
    <text x="456" y="336">x</text>
    <text x="128" y="40">y</text>
    <text x="113" y="348">0</text>
    <text x="184" y="354">1</text>
    <text x="254" y="354">2</text>
    <text x="324" y="354">3</text>
    <text x="394" y="354">4</text>
    <text x="102" y="335">0</text>
    <text x="102" y="285">1</text>
    <text x="102" y="235">2</text>
    <text x="102" y="185">3</text>
    <text x="102" y="135">4</text>
    <text x="102" y="85">5</text>
    <text x="276" y="274">顶点 (2, 1)</text>
  </g>
  <rect class="note" x="500" y="76" width="220" height="224" rx="18"/>
  <text class="highlight" x="522" y="108">配方后最清楚</text>
  <text class="text" x="522" y="140">
    <tspan>y = (x - 2)</tspan>
    <tspan font-size="12" dy="-6">2</tspan>
    <tspan font-size="16" dy="6"> + 1</tspan>
  </text>
  <text class="small" x="522" y="176">对称轴：x = 2</text>
  <text class="small" x="522" y="206">顶点： (2, 1)</text>
  <text class="small" x="522" y="236">开口向上，所以最低点</text>
  <text class="small" x="522" y="258">就在顶点处。</text>
  <text class="text" x="522" y="288">最小值：1</text>
</svg>

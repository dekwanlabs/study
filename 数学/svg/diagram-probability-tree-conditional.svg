<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .line { stroke: #64748b; stroke-width: 2.2; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .redNode { fill: #fee2e2; stroke: #ef4444; stroke-width: 1.5; }
      .blueNode { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.5; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .formula {
        font-family: "Times New Roman", "Cambria Math", serif;
        font-size: 22px;
        fill: #0f766e;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect class="bg" width="960" height="380" rx="18"/>
  <text class="title" x="34" y="44">条件概率的树状图</text>

  <circle class="node" cx="88" cy="190" r="34"/>
  <text class="text" x="62" y="196">开始</text>

  <line class="line" x1="122" y1="178" x2="270" y2="110"/>
  <line class="line" x1="122" y1="202" x2="270" y2="270"/>
  <text class="small" x="162" y="146">3/5</text>
  <text class="small" x="162" y="246">2/5</text>

  <circle class="redNode" cx="298" cy="94" r="28"/>
  <circle class="blueNode" cx="298" cy="286" r="28"/>
  <text class="text" x="281" y="100">红</text>
  <text class="text" x="281" y="292">蓝</text>

  <line class="line" x1="326" y1="94" x2="506" y2="54"/>
  <line class="line" x1="326" y1="94" x2="506" y2="134"/>
  <line class="line" x1="326" y1="286" x2="506" y2="246"/>
  <line class="line" x1="326" y1="286" x2="506" y2="326"/>
  <text class="small" x="392" y="68">2/4</text>
  <text class="small" x="392" y="126">2/4</text>
  <text class="small" x="392" y="256">3/4</text>
  <text class="small" x="392" y="316">1/4</text>

  <rect class="redNode" x="506" y="38" width="86" height="32" rx="12"/>
  <rect class="blueNode" x="506" y="118" width="86" height="32" rx="12"/>
  <rect class="redNode" x="506" y="230" width="86" height="32" rx="12"/>
  <rect class="blueNode" x="506" y="310" width="86" height="32" rx="12"/>
  <text class="text" x="534" y="60">红红</text>
  <text class="text" x="534" y="140">红蓝</text>
  <text class="text" x="534" y="252">蓝红</text>
  <text class="text" x="534" y="332">蓝蓝</text>

  <rect class="note" x="648" y="92" width="262" height="188" rx="18"/>
  <text class="text" x="676" y="130">关键不是背公式，而是：</text>
  <text class="small" x="676" y="164">第一次结果一确定，第二次的样本空间就变了。</text>
  <text class="small" x="676" y="194">比如“已知第一次红”，盒里就只剩 2 红 2 蓝。</text>
  <text class="formula" x="676" y="238">P(第二次红 | 第一次红) = 2/4</text>
</svg>

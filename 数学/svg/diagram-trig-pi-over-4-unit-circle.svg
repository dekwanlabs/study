<svg xmlns="http://www.w3.org/2000/svg" width="840" height="460" viewBox="0 0 840 460">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .axis { stroke: #334155; stroke-width: 2.6; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .circle { fill: none; stroke: #0f766e; stroke-width: 3; }
      .radius { stroke: #dc2626; stroke-width: 3; }
      .guide { stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 7 5; }
      .arc { fill: none; stroke: #7c3aed; stroke-width: 2.2; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #475569;
      }
      .formula {
        font-family: "Times New Roman", "Cambria Math", "STIX Two Math", serif;
        font-size: 18px;
        fill: #0f172a;
      }
      .sup {
        font-size: 70%;
        baseline-shift: super;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #0f766e;
      }
      .accent {
        fill: #dc2626;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="840" height="460" rx="18"/>
  <text class="title" x="34" y="42">单位圆里看 π/4</text>

  <g class="grid">
    <line x1="70" y1="100" x2="390" y2="100"/>
    <line x1="70" y1="160" x2="390" y2="160"/>
    <line x1="70" y1="280" x2="390" y2="280"/>
    <line x1="70" y1="340" x2="390" y2="340"/>
    <line x1="100" y1="70" x2="100" y2="370"/>
    <line x1="160" y1="70" x2="160" y2="370"/>
    <line x1="280" y1="70" x2="280" y2="370"/>
    <line x1="340" y1="70" x2="340" y2="370"/>
  </g>

  <line class="axis" x1="40" y1="220" x2="410" y2="220" marker-end="url(#arrow)"/>
  <line class="axis" x1="220" y1="390" x2="220" y2="36" marker-end="url(#arrow)"/>
  <circle class="circle" cx="220" cy="220" r="120"/>

  <line class="radius" x1="220" y1="220" x2="305" y2="135"/>
  <line class="guide" x1="220" y1="135" x2="305" y2="135"/>
  <line class="guide" x1="305" y1="135" x2="305" y2="220"/>
  <path class="arc" d="M264 220 A44 44 0 0 0 251 189"/>

  <circle cx="305" cy="135" r="5.5" fill="#dc2626"/>
  <circle cx="340" cy="220" r="4.5" fill="#0f766e"/>
  <circle cx="220" cy="100" r="4.5" fill="#0f766e"/>
  <circle cx="220" cy="220" r="4.5" fill="#0f172a"/>

  <g class="text">
    <text x="412" y="226">x</text>
    <text x="228" y="34">y</text>
    <text x="228" y="242">O</text>
    <text x="347" y="226">1</text>
    <text x="228" y="94">1</text>
    <text x="312" y="130">P</text>
    <text x="246" y="188">π/4</text>
    <text x="244" y="167" class="accent">OP = 1</text>
    <text x="250" y="128" fill="#2563eb">t</text>
    <text x="314" y="184" fill="#2563eb">t</text>
  </g>

  <rect class="note" x="430" y="60" width="340" height="390" rx="18"/>
  <text class="highlight" x="453" y="96">老师这样看这张图</text>

  <text class="small" x="453" y="132">1. 单位圆半径固定为 1。</text>
  <text class="small" x="453" y="160">2. π/4 就是 45°。</text>
  <text class="small" x="453" y="188">3. 所以图中直角三角形两直角边相等。</text>
  <text class="small" x="453" y="216">4. 设这两条边都等于 t。</text>

  <text class="formula" x="453" y="258">t<tspan class="sup">2</tspan> + t<tspan class="sup">2</tspan> = 1</text>
  <text class="formula" x="453" y="286">2t<tspan class="sup">2</tspan> = 1</text>
  <text class="formula" x="453" y="314">t<tspan class="sup">2</tspan> = 1/2</text>
  <text class="formula" x="453" y="342">t = √2/2</text>

  <text class="small" x="453" y="374">横坐标是 cos(π/4)，纵坐标是 sin(π/4)。</text>
  <text class="formula" x="453" y="404">sin(π/4) = cos(π/4)</text>
  <text class="formula" x="453" y="430">= √2/2</text>
</svg>

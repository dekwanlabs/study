<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .edge { fill: none; stroke: #64748b; stroke-width: 2.2; }
      .parallel { stroke: #2563eb; stroke-width: 4; }
      .perp { stroke: #dc2626; stroke-width: 4; }
      .diag { stroke: #16a34a; stroke-width: 4; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #475569;
      }
      .formula {
        font-family: "Times New Roman", "Cambria Math", serif;
        font-size: 21px;
        fill: #0f766e;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect class="bg" width="960" height="400" rx="18"/>
  <text class="title" x="34" y="44">正方体里的平行、垂直和空间对角线</text>

  <g transform="translate(100,92)">
    <polygon class="edge" points="0,180 180,180 180,0 0,0 0,180"/>
    <polygon class="edge" points="70,120 250,120 250,-60 70,-60 70,120"/>
    <line class="edge" x1="0" y1="180" x2="70" y2="120"/>
    <line class="edge" x1="180" y1="180" x2="250" y2="120"/>
    <line class="edge" x1="180" y1="0" x2="250" y2="-60"/>
    <line class="edge" x1="0" y1="0" x2="70" y2="-60"/>

    <line class="parallel" x1="0" y1="180" x2="180" y2="180"/>
    <line class="parallel" x1="70" y1="120" x2="250" y2="120"/>
    <line class="perp" x1="180" y1="180" x2="250" y2="120"/>
    <line class="diag" x1="0" y1="180" x2="250" y2="-60"/>

    <text class="text" x="-12" y="200">A</text>
    <text class="text" x="184" y="200">B</text>
    <text class="text" x="186" y="0">C</text>
    <text class="text" x="-18" y="0">D</text>
    <text class="text" x="58" y="140">A1</text>
    <text class="text" x="252" y="140">B1</text>
    <text class="text" x="254" y="-60">C1</text>
    <text class="text" x="52" y="-60">D1</text>
  </g>

  <rect class="note" x="520" y="92" width="334" height="226" rx="18"/>
  <text class="text" x="548" y="132">图里三个最常见的空间关系：</text>
  <text class="small" x="548" y="168">1. 蓝色两条边方向相同，所以 AB // A1B1</text>
  <text class="small" x="548" y="198">2. 红色棱从底面竖起来，所以 AB ⟂ BB1</text>
  <text class="small" x="548" y="228">3. 绿色连的是 A 到 C1，它是空间对角线</text>
  <text class="small" x="548" y="258">空间题想不清时，先把正方体当“坐标支架”。</text>
  <text class="formula" x="548" y="296">AB // A1B1,  AB ⟂ BB1</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.5; }
      .curve { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .secant { stroke: #2563eb; stroke-width: 3.2; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="420" rx="18"/>
  <text class="title" x="34" y="42">平均变化率看的是割线斜率</text>
  <g class="grid">
    <line x1="110" y1="80" x2="440" y2="80"/>
    <line x1="110" y1="136" x2="440" y2="136"/>
    <line x1="110" y1="192" x2="440" y2="192"/>
    <line x1="110" y1="248" x2="440" y2="248"/>
    <line x1="110" y1="304" x2="440" y2="304"/>
    <line x1="110" y1="360" x2="440" y2="360"/>
    <line x1="110" y1="80" x2="110" y2="360"/>
    <line x1="200" y1="80" x2="200" y2="360"/>
    <line x1="290" y1="80" x2="290" y2="360"/>
    <line x1="380" y1="80" x2="380" y2="360"/>
    <line x1="440" y1="80" x2="440" y2="360"/>
  </g>
  <line class="axis" x1="80" y1="360" x2="470" y2="360" marker-end="url(#arrow)"/>
  <line class="axis" x1="110" y1="388" x2="110" y2="48" marker-end="url(#arrow)"/>
  <path class="curve" d="M110 360 C150 356 182 346 200 332 C245 296 286 248 335 185 C356 156 370 129 398 82"/>
  <line class="secant" x1="200" y1="332" x2="380" y2="108"/>
  <circle cx="200" cy="332" r="6" fill="#2563eb"/>
  <circle cx="380" cy="108" r="6" fill="#2563eb"/>
  <g class="text">
    <text x="478" y="366">x</text>
    <text x="118" y="48">y</text>
    <text x="103" y="378">0</text>
    <text x="194" y="384">1</text>
    <text x="284" y="384">2</text>
    <text x="374" y="384">3</text>
    <text x="103" y="365">0</text>
    <text x="96" y="309">2</text>
    <text x="96" y="253">4</text>
    <text x="96" y="197">6</text>
    <text x="96" y="141">8</text>
    <text x="88" y="85">10</text>
    <text x="154" y="324">A(1, 1)</text>
    <text x="390" y="102">B(3, 9)</text>
    <text x="246" y="206" fill="#2563eb">割线 AB</text>
  </g>
  <rect class="note" x="510" y="88" width="210" height="194" rx="18"/>
  <text class="highlight" x="532" y="120">平均变化率</text>
  <text class="small" x="532" y="154">[f(3) - f(1)] / (3 - 1)</text>
  <text class="small" x="532" y="184">= (9 - 1) / 2</text>
  <text class="text" x="532" y="220">= 4</text>
  <text class="small" x="532" y="254">它对应的是两点连线</text>
  <text class="small" x="532" y="276">形成的割线斜率。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .axis { stroke: #334155; stroke-width: 2.4; }
      .guide { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 6; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="360" rx="18"/>
  <text class="title" x="34" y="42">平行向量的本质：方向相同</text>
  <line class="axis" x1="80" y1="300" x2="400" y2="300" marker-end="url(#arrow)"/>
  <line class="axis" x1="120" y1="330" x2="120" y2="42" marker-end="url(#arrow)"/>
  <line class="guide" x1="120" y1="300" x2="320" y2="0"/>
  <line x1="120" y1="300" x2="190" y2="195" stroke="#2563eb" stroke-width="3.6" marker-end="url(#arrow)"/>
  <line x1="120" y1="300" x2="260" y2="90" stroke="#dc2626" stroke-width="3.6" marker-end="url(#arrow)"/>
  <g class="text">
    <text x="408" y="306">x</text>
    <text x="128" y="40">y</text>
    <text x="200" y="190" fill="#2563eb">a = (2, 3)</text>
    <text x="270" y="86" fill="#dc2626">b = (4, 6)</text>
  </g>
  <rect class="note" x="470" y="82" width="230" height="200" rx="18"/>
  <text class="highlight" x="492" y="114">为什么平行</text>
  <text class="small" x="492" y="148">b = 2a</text>
  <text class="small" x="492" y="178">坐标成比例，方向一致</text>
  <text class="small" x="492" y="208">2 × 6 = 4 × 3</text>
  <text class="text" x="492" y="242">判定式：x1y2 = x2y1</text>
</svg>

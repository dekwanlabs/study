<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.6; }
      .line { stroke: #0f766e; stroke-width: 4; }
      .normal { stroke: #64748b; stroke-width: 2.6; stroke-dasharray: 8 6; }
      .distPos { stroke: #dc2626; stroke-width: 3.2; }
      .distNeg { stroke: #2563eb; stroke-width: 3.2; }
      .pointPos { fill: #dc2626; }
      .pointNeg { fill: #2563eb; }
      .pointH { fill: #ea580c; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #475569;
      }
      .formula {
        font-family: "Times New Roman", "Cambria Math", serif;
        font-size: 21px;
        fill: #0f172a;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="940" height="420" rx="18"/>
  <text class="title" x="34" y="42">为什么公式里要取绝对值</text>

  <g class="grid">
    <line x1="78" y1="88" x2="458" y2="88"/>
    <line x1="78" y1="148" x2="458" y2="148"/>
    <line x1="78" y1="208" x2="458" y2="208"/>
    <line x1="78" y1="268" x2="458" y2="268"/>
    <line x1="78" y1="328" x2="458" y2="328"/>
    <line x1="98" y1="68" x2="98" y2="348"/>
    <line x1="158" y1="68" x2="158" y2="348"/>
    <line x1="218" y1="68" x2="218" y2="348"/>
    <line x1="278" y1="68" x2="278" y2="348"/>
    <line x1="338" y1="68" x2="338" y2="348"/>
    <line x1="398" y1="68" x2="398" y2="348"/>
  </g>

  <line class="axis" x1="48" y1="208" x2="488" y2="208" marker-end="url(#arrow)"/>
  <line class="axis" x1="278" y1="368" x2="278" y2="38" marker-end="url(#arrow)"/>

  <line class="line" x1="100" y1="310" x2="430" y2="130"/>
  <line class="normal" x1="160" y1="64" x2="340" y2="394"/>
  <circle class="pointH" cx="250" cy="228" r="6"/>
  <circle class="pointPos" cx="196" cy="129" r="6"/>
  <circle class="pointNeg" cx="322" cy="360" r="6"/>
  <line class="distPos" x1="250" y1="228" x2="196" y2="129"/>
  <line class="distNeg" x1="250" y1="228" x2="322" y2="360"/>

  <g class="text">
    <text x="438" y="134">l</text>
    <text x="204" y="122">P₊</text>
    <text x="330" y="376">P₋</text>
    <text x="258" y="222">H</text>
    <text x="126" y="94" fill="#dc2626">Ax + By + C &gt; 0</text>
    <text x="316" y="334" fill="#2563eb">Ax + By + C &lt; 0</text>
    <text x="216" y="176" fill="#dc2626">d</text>
    <text x="290" y="298" fill="#2563eb">d</text>
    <text x="496" y="214">x</text>
    <text x="286" y="36">y</text>
    <text x="286" y="230">O</text>
  </g>

  <rect class="note" x="516" y="88" width="316" height="222" rx="18"/>
  <text class="highlight" x="624" y="122">看图顺序</text>
  <text class="small" x="544" y="158">1. 点在直线两侧时，Ax + By + C 的符号会变</text>
  <text class="small" x="544" y="190">2. 但红色和蓝色线段的长度都表示“距离”</text>
  <text class="small" x="544" y="222">3. 距离永远不能是负数</text>
  <text class="small" x="544" y="254">4. 所以分子必须取绝对值</text>
  <text class="formula" x="544" y="292">d = |Ax₀ + By₀ + C| / √(A² + B²)</text>
</svg>

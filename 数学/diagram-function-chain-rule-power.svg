<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .axis { stroke: #334155; stroke-width: 2.5; }
      .guide { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 6; }
      .curve { fill: none; stroke: #dc2626; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #0f172a;
      }
      .text {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        fill: #0f172a;
      }
      .small {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 15px;
        fill: #475569;
      }
      .highlight {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 17px;
        font-weight: 600;
        fill: #0f766e;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="420" rx="18"/>
  <text class="title" x="34" y="42">链式法则先分“里外层”</text>
  <g class="grid">
    <line x1="90" y1="90" x2="450" y2="90"/>
    <line x1="90" y1="150" x2="450" y2="150"/>
    <line x1="90" y1="210" x2="450" y2="210"/>
    <line x1="90" y1="270" x2="450" y2="270"/>
    <line x1="90" y1="330" x2="450" y2="330"/>
    <line x1="150" y1="50" x2="150" y2="350"/>
    <line x1="230" y1="50" x2="230" y2="350"/>
    <line x1="310" y1="50" x2="310" y2="350"/>
    <line x1="390" y1="50" x2="390" y2="350"/>
    <line x1="450" y1="50" x2="450" y2="350"/>
  </g>
  <line class="axis" x1="70" y1="220" x2="480" y2="220" marker-end="url(#arrow)"/>
  <line class="axis" x1="310" y1="380" x2="310" y2="24" marker-end="url(#arrow)"/>
  <path class="curve" d="M100 320 C142 314 168 292 182 252 C188 234 190 226 190 220 C190 214 192 206 198 188 C212 148 242 126 300 118 C354 110 394 94 438 48"/>
  <circle cx="190" cy="220" r="6" fill="#2563eb"/>
  <line class="guide" x1="190" y1="220" x2="190" y2="330"/>
  <g class="text">
    <text x="488" y="226">x</text>
    <text x="318" y="24">y</text>
    <text x="304" y="242">0</text>
    <text x="144" y="242">-2</text>
    <text x="224" y="242">-1</text>
    <text x="384" y="242">1</text>
    <text x="168" y="350">x = -3/2</text>
  </g>
  <rect class="note" x="520" y="76" width="210" height="238" rx="18"/>
  <text class="highlight" x="542" y="108">先分层</text>
  <text class="small" x="542" y="142">内层：u = 2x + 3</text>
  <text class="small" x="542" y="172">
    <tspan>外层：y = u</tspan>
    <tspan font-size="11" dy="-5">5</tspan>
  </text>
  <text class="text" x="542" y="210">求导顺序：</text>
  <text class="small" x="542" y="238">
    <tspan>y' = 5u</tspan>
    <tspan font-size="11" dy="-5">4</tspan>
    <tspan font-size="15" dy="5"> · u'</tspan>
  </text>
  <text class="small" x="542" y="268">u' = 2</text>
  <text class="highlight" x="542" y="298">
    <tspan>y' = 10(2x + 3)</tspan>
    <tspan font-size="13" dy="-6">4</tspan>
  </text>
</svg>

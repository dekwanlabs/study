<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="700" height="360" fill="#fffdf7"/>
  <line x1="70" y1="300" x2="370" y2="300" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="100" y1="330" x2="100" y2="40" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="100" y1="300" x2="180" y2="180" stroke="#2563eb" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="300" x2="260" y2="60" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" font-size="18" fill="#0f172a">
    <text x="377" y="306">x</text>
    <text x="108" y="36">y</text>
    <text x="190" y="176" fill="#2563eb">a = (2, 3)</text>
    <text x="270" y="56" fill="#dc2626">b = (4, 6)</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="17" fill="#334155">
    <text x="440" y="98">Parallel idea:</text>
    <text x="440" y="126">b = 2a</text>
    <text x="440" y="160">Coordinates are proportional.</text>
    <text x="440" y="202">2 * 6 = 4 * 3</text>
    <text x="440" y="236">x1 y2 = x2 y1</text>
  </g>
</svg>
